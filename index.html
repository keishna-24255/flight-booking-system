<!DOCTYPE html>
<html>
<head>
  <title>Flight Booking System</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    button {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }
    hr {
      margin: 30px;
    }
    .seat {
      background-color: lightgray;
    }
    .selected {
      background-color: green;
      color: white;
    }
    textarea {
      width: 300px;
      height: 80px;
    }
  </style>

</head>
<body>

<h1>Flight Booking System</h1>

<hr>

<!-- TASK 1 -->
<h2>Task 1: Live Flight Status</h2>

<select id="flight">
  <option value="on">Flight A - On Time</option>
  <option value="delay">Flight B - Delayed</option>
  <option value="board">Flight C - Boarding</option>
</select>

<br><br>

<button onclick="checkStatus()">Check Status</button>
<p id="result"></p>

<hr>

<!-- TASK 2 -->
<h2>Task 2: Dynamic Pricing Engine</h2>

<label>Select Season:</label>
<select id="season">
  <option value="normal">Normal</option>
  <option value="peak">Peak (Holiday)</option>
</select>

<br><br>

<button onclick="generatePrice()">Get Price</button>
<button onclick="freezePrice()">Freeze Price</button>

<p id="price">Price: ₹5000</p>
<p id="freeze"></p>

<h3>Price History</h3>
<ul id="history"></ul>

<hr>

<!-- TASK 3 -->
<h2>Task 3: Cancellation & Refund</h2>

<label>Booking Amount:</label>
<input type="number" id="amount" value="5000">

<br><br>

<label>Reason:</label>
<select id="reason">
  <option>Personal</option>
  <option>Schedule Change</option>
  <option>Other</option>
</select>

<br><br>

<button onclick="cancelBooking()">Cancel Booking</button>

<p id="refund"></p>
<p id="status"></p>

<hr>

<!-- TASK 4 -->
<h2>Task 4: Seat Selection</h2>

<div>
  <button class="seat" onclick="selectSeat(this,'A1')">A1</button>
  <button class="seat" onclick="selectSeat(this,'A2')">A2</button>
  <button class="seat" onclick="selectSeat(this,'B1')">B1</button>
  <button class="seat" onclick="selectSeat(this,'B2')">B2</button>
</div>

<p id="seatResult"></p>

<hr>

<!-- TASK 5 -->
<h2>Task 5: Review & Rating</h2>

<select id="rating">
  <option value="1">1 ⭐</option>
  <option value="2">2 ⭐⭐</option>
  <option value="3">3 ⭐⭐⭐</option>
  <option value="4">4 ⭐⭐⭐⭐</option>
  <option value="5">5 ⭐⭐⭐⭐⭐</option>
</select>

<br><br>

<textarea id="reviewText" placeholder="Write your review"></textarea>

<br><br>

<button onclick="submitReview()">Submit</button>

<ul id="reviews"></ul>

<hr>

<!-- TASK 6 -->
<h2>Task 6: Personalized Recommendations</h2>

<label>Select Preference:</label>
<select id="preference">
  <option value="beach">Beach</option>
  <option value="mountain">Mountain</option>
  <option value="city">City</option>
</select>

<br><br>

<button onclick="getRecommendation()">Get Recommendation</button>

<p id="recommendation"></p>

<script>

// TASK 1
function checkStatus() {
  let flight = document.getElementById("flight").value;
  let result = "";

  if (flight === "on") result = "Flight is On Time";
  else if (flight === "delay") result = "Delayed by 1 hour";
  else result = "Now Boarding";

  document.getElementById("result").innerText = result;
}

// TASK 2
let currentPrice = 5000;
let frozen = false;

function generatePrice() {
  if (frozen) {
    document.getElementById("freeze").innerText = "Price Frozen!";
    return;
  }

  let price = Math.floor(Math.random() * 3000) + 5000;
  let season = document.getElementById("season").value;

  if (season === "peak") price += price * 0.2;

  currentPrice = Math.floor(price);

  document.getElementById("price").innerText = "Price: ₹" + currentPrice;

  let li = document.createElement("li");
  li.innerText = "₹" + currentPrice;
  document.getElementById("history").appendChild(li);
}

function freezePrice() {
  frozen = true;
  document.getElementById("freeze").innerText =
    "Locked at ₹" + currentPrice;
}

// TASK 3
function cancelBooking() {
  let amount = document.getElementById("amount").value;
  let refund = amount * 0.5;

  document.getElementById("refund").innerText =
    "Refund: ₹" + refund;

  document.getElementById("status").innerText = "Processing...";

  setTimeout(() => {
    document.getElementById("status").innerText = "Completed";
  }, 3000);
}

// TASK 4
function selectSeat(btn, seat) {
  let seats = document.getElementsByClassName("seat");

  for (let i = 0; i < seats.length; i++) {
    seats[i].classList.remove("selected");
  }

  btn.classList.add("selected");

  document.getElementById("seatResult").innerText =
    "Selected Seat: " + seat;
}

// TASK 5
function submitReview() {
  let rating = document.getElementById("rating").value;
  let text = document.getElementById("reviewText").value;

  let li = document.createElement("li");
  li.innerText = rating + " ⭐ - " + text;

  document.getElementById("reviews").appendChild(li);

  document.getElementById("reviewText").value = "";
}

// TASK 6
function getRecommendation() {
  let pref = document.getElementById("preference").value;
  let result = "";

  if (pref === "beach") {
    result = "You like beaches! Try Bali 🏝️";
  } else if (pref === "mountain") {
    result = "You like mountains! Try Manali 🏔️";
  } else {
    result = "You like cities! Try New York 🌆";
  }

  document.getElementById("recommendation").innerText = result;
}

</script>

</body>
</html>
